<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form with CSS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef6fb;
            color: #1a3b5d;
            padding: 20px;
        }
        .form-box {
            max-width: 400px;
            background: #cce9cc;
            border: 1px solid #bcd4eb;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 10px rgba(26, 95, 158, 0.12);
        }
        h1 {
            color: #000000;
            font-family: 'Georgia', serif;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 4px;
            font-weight: bold;
            color: #1a3b5d;
        }
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #bcccdc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 14px;
            padding: 10px 16px;
            background: #1a5f9e;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }
        button:hover {
            background: #144974;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="form-box">
        <h1>Contact Form</h1>
        <form style="background: #ffffff; padding: 16px; border-radius: 6px;">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name"> 

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com">

            <label for="topic">Topic</label>
            <select id="topic" name="topic">
                <option>Question</option>
                <option>Feedback</option>
                <option>Other</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Type your message..."></textarea>

            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
